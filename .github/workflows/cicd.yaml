name: CI_CD
on: [push,pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configurar Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies      
        run: npm install

      - name: Build UI      
        run: |
          cd src/front
          npm install --legacy-peer-deps
          npm run build

      - name: Test
        run: npm test